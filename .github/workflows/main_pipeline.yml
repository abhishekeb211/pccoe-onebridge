name: OneBridge Unified Pipeline

on:
  push:
    branches: [ "main", "staging", "feature/**" ]
  pull_request:
    branches: [ "main", "staging" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- Quality Assurance Job ---
  quality-assurance:
    name: Linting & Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Initialize JSON Registry
        run: |
          python -c "from database_schema import init_db; init_db()"

      - name: Python Lint (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Frontend Dependencies
        run: npm install

      - name: Frontend Audits
        continue-on-error: true
        run: |
          npx htmlhint index.html
          npx stylelint styles.css
          # Skipping pa11y temporarily
          # npx pa11y index.html --threshold 500

      - name: Run Backend Tests
        continue-on-error: true
        run: |
          pytest tests/ -v --junitxml=pytest-results.xml --tb=short

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml

  # --- Pages Deployment Job ---
  deploy-production:
    name: Deploy to GitHub Pages
    needs: quality-assurance
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Static Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # --- E2E Browser Test Job ---
  e2e-test:
    name: E2E Browser Tests (Playwright)
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --save-dev playwright
          npx playwright install

      - name: Run E2E Tests on Live Site
        run: npx playwright test tests/e2e/
        env:
          BASE_URL: https://abhishekeb211.github.io/pccoe-onebridge/

  # --- Docker Build & Push ---
  docker-deploy:
    name: Build & Push Docker Image
    needs: quality-assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # --- Fly.io Deploy (Optional) ---
  fly-deploy:
    name: Deploy to Fly.io
    needs: docker-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
