<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PCCOE OneBridge - Redirecting...</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        // This script checks to see if a redirect is present in the query string
        // and converts it back into the correct url and adds it to the
        // browser's history using window.history.replaceState(...),
        // which will cause the window to load the correct out-of-the-box page.
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) { 
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <script type="text/javascript">
        // Basic fallback for simple static hosting without the complex script above
        // If someone lands on a 404, just send them back to the root index.html
        window.location.href = window.location.pathname.split('/').slice(0, -1).join('/') + '/index.html';
    </script>
</head>
<body>
    Redirecting to <a href="index.html">OneBridge Home</a>...
</body>
</html>
