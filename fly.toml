# fly.toml app configuration file generated for special-students-app on 2024-05-01T00:00:00Z
app = "special-students-app"

kill_signal = "SIGINT"
kill_timeout = 5

[env]
PORT = "8000"

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = 10000
    timeout = 2000
    grace_period = "5s"
    restart_limit = 0
